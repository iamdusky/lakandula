<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="monospace">
  <defs>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#232327"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#33333a" stroke-width="3"/>
    </pattern>
  </defs>
  <rect width="960" height="660" fill="#1a1c20"/>
  <text x="20" y="30" fill="#e8e4d8" font-size="18" font-weight="bold">LAKANDULA — sprite sheet grid (option B: single-sheet delivery)</text>
  <text x="20" y="52" fill="#9aa0a8" font-size="13">One PNG, true alpha. Fixed cell size — every cell identical, sized to fit the WIDEST frame (death, lying down).</text>

  <!-- column headers -->
  <text x="130" y="86" fill="#8fd18f" font-size="13">frames read left ➜ right · character faces RIGHT ➜</text>

  <!-- grid: origin (130,96), cell 96 -->
  <!-- row labels -->
  <text x="20" y="152" fill="#e8e4d8" font-size="14">IDLE</text>
  <text x="20" y="168" fill="#9aa0a8" font-size="11">2 frames</text>
  <text x="20" y="248" fill="#e8e4d8" font-size="14">WALK</text>
  <text x="20" y="264" fill="#9aa0a8" font-size="11">4 frames</text>
  <text x="20" y="344" fill="#e8e4d8" font-size="14">ATTACK</text>
  <text x="20" y="360" fill="#9aa0a8" font-size="11">5 frames</text>
  <text x="20" y="440" fill="#e8e4d8" font-size="14">CHARGE</text>
  <text x="20" y="456" fill="#9aa0a8" font-size="11">4 (heroes only)</text>
  <text x="20" y="536" fill="#e8e4d8" font-size="14">DEATH</text>
  <text x="20" y="552" fill="#9aa0a8" font-size="11">6 frames</text>

  <!-- cells: rows y=96,192,288,384,480 ; cols x=130+96*i -->
  <!-- used cell counts per row: 2,4,5,4,6 -->
  <g stroke="#4a4f58" stroke-width="1">
    <!-- IDLE row -->
    <rect x="130" y="96"  width="96" height="96" fill="#2f4636"/><rect x="226" y="96"  width="96" height="96" fill="#2f4636"/>
    <rect x="322" y="96"  width="96" height="96" fill="url(#hatch)"/><rect x="418" y="96" width="96" height="96" fill="url(#hatch)"/><rect x="514" y="96" width="96" height="96" fill="url(#hatch)"/><rect x="610" y="96" width="96" height="96" fill="url(#hatch)"/>
    <!-- WALK row -->
    <rect x="130" y="192" width="96" height="96" fill="#2f4636"/><rect x="226" y="192" width="96" height="96" fill="#2f4636"/><rect x="322" y="192" width="96" height="96" fill="#2f4636"/><rect x="418" y="192" width="96" height="96" fill="#2f4636"/>
    <rect x="514" y="192" width="96" height="96" fill="url(#hatch)"/><rect x="610" y="192" width="96" height="96" fill="url(#hatch)"/>
    <!-- ATTACK row -->
    <rect x="130" y="288" width="96" height="96" fill="#2f4636"/><rect x="226" y="288" width="96" height="96" fill="#2f4636"/><rect x="322" y="288" width="96" height="96" fill="#2f4636"/><rect x="418" y="288" width="96" height="96" fill="#2f4636"/><rect x="514" y="288" width="96" height="96" fill="#2f4636"/>
    <rect x="610" y="288" width="96" height="96" fill="url(#hatch)"/>
    <!-- CHARGE row -->
    <rect x="130" y="384" width="96" height="96" fill="#2f4636"/><rect x="226" y="384" width="96" height="96" fill="#2f4636"/><rect x="322" y="384" width="96" height="96" fill="#2f4636"/><rect x="418" y="384" width="96" height="96" fill="#2f4636"/>
    <rect x="514" y="384" width="96" height="96" fill="url(#hatch)"/><rect x="610" y="384" width="96" height="96" fill="url(#hatch)"/>
    <!-- DEATH row -->
    <rect x="130" y="480" width="96" height="96" fill="#2f4636"/><rect x="226" y="480" width="96" height="96" fill="#2f4636"/><rect x="322" y="480" width="96" height="96" fill="#2f4636"/><rect x="418" y="480" width="96" height="96" fill="#2f4636"/><rect x="514" y="480" width="96" height="96" fill="#2f4636"/><rect x="610" y="480" width="96" height="96" fill="#2f4636"/>
  </g>

  <!-- frame indices -->
  <g fill="#cfd4da" font-size="12">
    <text x="170" y="120">0</text><text x="266" y="120">1</text>
    <text x="170" y="216">0</text><text x="266" y="216">1</text><text x="362" y="216">2</text><text x="458" y="216">3</text>
    <text x="170" y="312">0</text><text x="266" y="312">1</text><text x="362" y="312">2</text><text x="458" y="312">3</text><text x="554" y="312">4</text>
    <text x="170" y="408">0</text><text x="266" y="408">1</text><text x="362" y="408">2</text><text x="458" y="408">3</text>
    <text x="170" y="504">0</text><text x="266" y="504">1</text><text x="362" y="504">2</text><text x="458" y="504">3</text><text x="554" y="504">4</text><text x="650" y="504">5</text>
  </g>

  <!-- baselines per row -->
  <g stroke="#e05a4e" stroke-width="2" stroke-dasharray="6 4">
    <line x1="130" y1="178" x2="706" y2="178"/>
    <line x1="130" y1="274" x2="706" y2="274"/>
    <line x1="130" y1="370" x2="706" y2="370"/>
    <line x1="130" y1="466" x2="706" y2="466"/>
    <line x1="130" y1="562" x2="706" y2="562"/>
  </g>
  <text x="712" y="182" fill="#e05a4e" font-size="12">← feet baseline</text>
  <text x="712" y="198" fill="#e05a4e" font-size="11">same Y offset in</text>
  <text x="712" y="212" fill="#e05a4e" font-size="11">EVERY cell</text>

  <text x="330" y="140" fill="#6b7078" font-size="11">unused cells:</text>
  <text x="330" y="154" fill="#6b7078" font-size="11">fully transparent</text>

  <!-- zoomed single cell -->
  <g transform="translate(740,300)">
    <text x="0" y="-14" fill="#e8e4d8" font-size="14" font-weight="bold">one cell, zoomed</text>
    <rect x="0" y="0" width="190" height="190" fill="#2f4636" stroke="#4a4f58"/>
    <!-- figure placeholder -->
    <rect x="72" y="52" width="46" height="110" rx="8" fill="#7a4a2a"/>
    <circle cx="95" cy="42" r="16" fill="#8a5a34"/>
    <!-- baseline -->
    <line x1="0" y1="162" x2="190" y2="162" stroke="#e05a4e" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="4" y="180" fill="#e05a4e" font-size="11">feet baseline, e.g. 14 px up</text>
    <!-- center -->
    <line x1="95" y1="0" x2="95" y2="190" stroke="#5aa0e0" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="100" y="14" fill="#5aa0e0" font-size="11">center X</text>
  </g>

  <!-- footer -->
  <g fill="#9aa0a8" font-size="13">
    <text x="20" y="606">• Non-hero units: omit the CHARGE row entirely (4 rows total, same order: idle / walk / attack / death).</text>
    <text x="20" y="626">• Option A (preferred): same rows as separate strips — &lt;unit&gt;_idle / _walk / _attack / _charge / _death .png</text>
    <text x="20" y="646">• Include cell size + baseline offset in the filename or a sidecar note, e.g. lapu_lapu_sheet_96x96_base14.png</text>
  </g>
</svg>
